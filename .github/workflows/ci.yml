name: CI Pipeline

on:
  push:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Install dependencies
      run: pip install -r requirements.txt
    
    - name: Build Docker image
      run: docker build -t my-app .

    - name: Test
      run: echo "CI running successfully"